<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quotable</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root[data-theme="dark"] {
      --bg:        #0d0d0d;
      --surface:   #161616;
      --border:    #2a2a2a;
      --text:      #e8e2d9;
      --muted:     #666;
      --accent:    #c8a96e;
      --btn-bg:    #1f1f1f;
      --btn-hover: #2a2a2a;
      --toggle-bg: #2a2a2a;
    }
    :root[data-theme="light"] {
      --bg:        #f5f0e8;
      --surface:   #fff;
      --border:    #e0d8cc;
      --text:      #1a1612;
      --muted:     #999;
      --accent:    #a0783a;
      --btn-bg:    #ede8df;
      --btn-hover: #e0d8cc;
      --toggle-bg: #e0d8cc;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      transition: background 0.3s, color 0.3s;
    }

    header {
      position: fixed;
      top: 1.5rem;
      right: 1.75rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .toggle-label {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      user-select: none;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      cursor: pointer;
    }
    .toggle input { display: none; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--toggle-bg);
      border-radius: 999px;
      transition: background 0.25s;
      border: 1px solid var(--border);
    }
    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      background: var(--accent);
      border-radius: 50%;
      transition: transform 0.25s;
    }
    .toggle input:checked ~ .toggle-track { background: var(--toggle-bg); }
    .toggle input:checked ~ .toggle-thumb { transform: translateX(18px); }

    main {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
    }

    .wordmark {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3rem 2.5rem 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      min-height: 200px;
      position: relative;
      transition: background 0.3s, border-color 0.3s;
    }

    .quote-mark {
      font-family: 'DM Serif Display', serif;
      font-size: 5rem;
      line-height: 0.6;
      color: var(--accent);
      opacity: 0.35;
      position: absolute;
      top: 1.5rem;
      left: 2.2rem;
      user-select: none;
    }

    #quote-text {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.25rem, 3vw, 1.65rem);
      font-style: italic;
      line-height: 1.55;
      padding-top: 1.2rem;
      min-height: 80px;
      transition: opacity 0.25s ease;
    }

    #quote-author {
      font-size: 0.82rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: opacity 0.25s ease;
    }

    .card-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 0.5rem;
      border-top: 1px solid var(--border);
    }

    button {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--btn-bg);
      color: var(--text);
      border-radius: 3px;
      padding: 0.55rem 1.1rem;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }
    button:hover { background: var(--btn-hover); border-color: var(--accent); }
    button:active { opacity: 0.7; }

    #copy-btn.copied {
      color: var(--accent);
      border-color: var(--accent);
    }

    #new-btn {
      background: var(--accent);
      color: #0d0d0d;
      border-color: var(--accent);
      font-weight: 600;
    }
    #new-btn:hover { opacity: 0.88; background: var(--accent); }

    .loading-dots span {
      display: inline-block;
      animation: blink 1.2s infinite;
      color: var(--muted);
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.15} 40%{opacity:1} }

    footer {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.03em;
    }
    footer a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s;
    }
    footer a:hover { border-color: var(--accent); }

    .fade { opacity: 0 !important; }
  </style>
</head>
<body>

  <header>
    <span class="toggle-label">Light</span>
    <label class="toggle" title="Toggle theme">
      <input type="checkbox" id="theme-toggle" />
      <div class="toggle-track"></div>
      <div class="toggle-thumb"></div>
    </label>
  </header>

  <main>
    <div class="wordmark">Quotable</div>

    <div class="card">
      <div class="quote-mark">"</div>
      <p id="quote-text">
        <span class="loading-dots">
          <span>●</span><span>●</span><span>●</span>
        </span>
      </p>
      <span id="quote-author"></span>

      <div class="card-actions">
        <button id="copy-btn" title="Copy to clipboard">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
          Copy
        </button>
        <button id="new-btn">
          New Quote →
        </button>
      </div>
    </div>

    <footer>By <a href="https://divyanshpandey.in" target="_blank" rel="noopener">Divyansh Pandey</a></footer>
  </main>

  <script>
    const quoteText   = document.getElementById('quote-text');
    const quoteAuthor = document.getElementById('quote-author');
    const newBtn      = document.getElementById('new-btn');
    const copyBtn     = document.getElementById('copy-btn');
    const themeToggle = document.getElementById('theme-toggle');

    let currentQuote = '';
    let currentAuthor = '';

    async function fetchQuote() {
      quoteText.classList.add('fade');
      quoteAuthor.classList.add('fade');

      await new Promise(r => setTimeout(r, 220));

      quoteText.innerHTML = `<span class="loading-dots"><span>●</span><span>●</span><span>●</span></span>`;
      quoteAuthor.textContent = '';

      quoteText.classList.remove('fade');
      quoteAuthor.classList.remove('fade');

      try {
        const res = await fetch('https://dummyjson.com/quotes/random');
        if (!res.ok) throw new Error('API error');
        const data = await res.json();

        currentQuote  = data.quote.trim();
        currentAuthor = data.author.trim() || 'Unknown';

        await new Promise(r => setTimeout(r, 150));

        quoteText.classList.add('fade');
        quoteAuthor.classList.add('fade');
        await new Promise(r => setTimeout(r, 200));

        quoteText.textContent  = currentQuote;
        quoteAuthor.textContent = `— ${currentAuthor}`;

        quoteText.classList.remove('fade');
        quoteAuthor.classList.remove('fade');

      } catch {
        quoteText.textContent   = 'Could not load a quote. Check your connection.';
        quoteAuthor.textContent = '';
      }
    }

    copyBtn.addEventListener('click', () => {
      if (!currentQuote) return;
      const text = `"${currentQuote}" — ${currentAuthor}`;
      navigator.clipboard.writeText(text).then(() => {
        copyBtn.classList.add('copied');
        copyBtn.innerHTML = `
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg> Copied`;
        setTimeout(() => {
          copyBtn.classList.remove('copied');
          copyBtn.innerHTML = `
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
            </svg> Copy`;
        }, 2000);
      });
    });

    newBtn.addEventListener('click', fetchQuote);

    themeToggle.addEventListener('change', () => {
      document.documentElement.setAttribute(
        'data-theme',
        themeToggle.checked ? 'light' : 'dark'
      );
    });

    fetchQuote();
  </script>
</body>
</html>
